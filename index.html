<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gotthelf Network</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1c22;
        font-family: 'Inter', system-ui, sans-serif;
      }
      #app {
        width: 100vw;
        height: 100vh;
        position: relative;
      }
      #graph {
        width: 100%;
        height: 100%;
      }
      #tooltip {
        position: fixed;
        pointer-events: none;
        background: rgba(20, 22, 30, 0.92);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 8px;
        padding: 8px 12px;
        color: #e8eaf0;
        font-size: 13px;
        line-height: 1.5;
        max-width: 260px;
        backdrop-filter: blur(8px);
        display: none;
        z-index: 100;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      }
      #tooltip .label { font-weight: 600; margin-bottom: 4px; }
      #tooltip .meta { font-size: 11px; color: rgba(255,255,255,0.5); }
      #title {
        position: fixed;
        top: 16px;
        left: 20px;
        color: rgba(255,255,255,0.75);
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.02em;
        z-index: 100;
        pointer-events: none;
      }
      #stats {
        position: fixed;
        top: 40px;
        left: 20px;
        color: rgba(255,255,255,0.35);
        font-size: 11px;
        z-index: 100;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="graph"></div>
      <div id="title">Gotthelf Network</div>
      <div id="stats"></div>
      <div id="tooltip">
        <div class="label" id="tt-label"></div>
        <div class="meta" id="tt-meta"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
